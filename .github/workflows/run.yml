name: 刷步数

on:
  # schedule:
  #   - cron: '21 1,4,7,10,12,14,23 * * *'
  workflow_dispatch:
    inputs:
      account:
        description: '小米运动账号'
        required: false
        type: string
      password:
        description: '小米运动密码'
        required: false
        type: string
      steps:
        description: '目标步数'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout codes
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.PAT }}
          
      - name: Update system and install zsh
        run: |
          sudo -E apt-get -qq update
          sudo -E apt-get install zsh -y
          
      - name: 初始化Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.10"
          
      - name: 开始
        env:
          AES_KEY: ${{ secrets.AES_KEY }}
          SECRET_CONFIG: ${{ secrets.CONFIG }}
          # 接收 API 传来的参数
          API_ACCOUNT: ${{ inputs.account }}
          API_PWD: ${{ inputs.password }}
          API_STEP: ${{ inputs.steps }}
        run: |
          pip3 install requests pytz pycryptodome
          
          # 【核心魔法】：自动将 API 参数转换为 Python 需要的 JSON 格式
          if [ -n "$API_ACCOUNT" ]; then
            echo "检测到 API 传入参数，正在生成临时 CONFIG..."
            export CONFIG="[{\"user\":\"$API_ACCOUNT\",\"pwd\":\"$API_PWD\",\"step\":\"$API_STEP\"}]"
          else
            echo "未检测到 API 参数，使用默认 Secret CONFIG..."
            export CONFIG="$SECRET_CONFIG"
          fi
          
          python3 main.py

      - name: persist tokens
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add .
          git commit -m "persist tokens trigger by ${{ github.event_name }}" || echo "No changes to commit"
          git push origin master
